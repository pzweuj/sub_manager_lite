name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Only run if commit message matches version pattern like v0.1.0
    if: |
      contains(github.event.head_commit.message, 'v0.') ||
      contains(github.event.head_commit.message, 'v1.') ||
      contains(github.event.head_commit.message, 'v2.') ||
      contains(github.event.head_commit.message, 'v3.') ||
      contains(github.event.head_commit.message, 'v4.') ||
      contains(github.event.head_commit.message, 'v5.') ||
      contains(github.event.head_commit.message, 'v6.') ||
      contains(github.event.head_commit.message, 'v7.') ||
      contains(github.event.head_commit.message, 'v8.') ||
      contains(github.event.head_commit.message, 'v9.')

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from commit message
        id: version
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          VERSION=$(echo "$COMMIT_MSG" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max